[font.normal]
family = "Fixed6x13"
style = "Regular"

[colors.primary]
background = "#000000"
foreground = "#ffffff"

[colors.normal]
black   = "#000000"
red     = "#ff7c4d"
green   = "#22ff00"
yellow  = "#ffcc00"
blue    = "#3399ff"
magenta = "#ff61df"
cyan    = "#00ffff"
white   = "#888888"

[colors.bright]
black   = "#000000"
red     = "#ff7c4d"
green   = "#22ff00"
yellow  = "#ffcc00"
blue    = "#3399ff"
magenta = "#ff61df"
cyan    = "#00ffff"
white   = "#ffffff"

[colors]
draw_bold_text_with_bright_colors = true

[terminal]
osc52 = "CopyPaste"

# Forward modified Enter keys as CSI-u sequences so pi (inside tmux) can
# distinguish Shift+Enter / Ctrl+Enter / Alt+Enter from plain Enter.
# Alacritty doesn't speak the Kitty keyboard protocol natively, so we map
# these manually.
[[keyboard.bindings]]
key = "Return"
mods = "Shift"
chars = "\u001b[13;2u"

[[keyboard.bindings]]
key = "Return"
mods = "Control"
chars = "\u001b[13;5u"

[[keyboard.bindings]]
key = "Return"
mods = "Alt"
chars = "\u001b[13;3u"
