# ── Fonts ────────────────────────────────────────────────────
# Fixed6x13 converted from PCF bitmap to TTF outline via bitmap2ttf.
# At 98 DPI, 9.5pt ≈ 13px (native bitmap size). Adjust to taste.
# C-S-= / C-S-- to tweak live, then update the value here.
font_family      Fixed6x13.ttf
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        9.5

# Outline alternatives if Fixed6x13 size can't be dialed in:
# font_family      Terminus (TTF)
# bold_font        Terminus (TTF) Bold
# italic_font      Terminus (TTF) Italic
# bold_italic_font Terminus (TTF) Bold Italic
# font_size        9.0
#
# font_family      DejaVu Sans Mono
# font_size        9.0

# Glyph compositing: <gamma> <contrast%>
# Higher gamma = thicker light-on-dark text. Default on Linux: 1.0 0
# "legacy" was too dark/thin; "platform" too bold. Try a middle ground.
text_composition_strategy 1.0 50

# ── Cursor ───────────────────────────────────────────────────
cursor_shape beam
cursor_blink_interval -1

# ── Scrollback ───────────────────────────────────────────────
scrollback_lines 10000

# ── Mouse ────────────────────────────────────────────────────
mouse_hide_wait 3.0
copy_on_select   no

# ── Performance ──────────────────────────────────────────────
repaint_delay 8
input_delay   2
sync_to_monitor yes

# ── Bell ─────────────────────────────────────────────────────
enable_audio_bell no

# ── Window ───────────────────────────────────────────────────
confirm_os_window_close -1

# ── Tab bar ──────────────────────────────────────────────────
tab_bar_edge bottom
tab_bar_style powerline
tab_powerline_style slanted
tab_bar_min_tabs 1
tab_title_template "{fmt.fg.red}{bell_symbol}{activity_symbol}{fmt.fg.tab}{session_name} {title}"
active_tab_font_style bold
# Only show tabs from current session (sessions feel like workspaces)
tab_bar_filter session:~ or session:^$

# ── Colors (ported from ~/.config/alacritty/alacritty.toml) ──
foreground #ffffff
background #000000
color0  #000000
color1  #ff7c4d
color2  #22ff00
color3  #ffcc00
color4  #3399ff
color5  #ff61df
color6  #00ffff
color7  #888888
color8  #000000
color9  #ff7c4d
color10 #22ff00
color11 #ffcc00
color12 #3399ff
color13 #ff61df
color14 #00ffff
color15 #ffffff

# ── Shell integration ────────────────────────────────────────
shell_integration enabled

# ── Remote control ───────────────────────────────────────────
# Required for save_as_session, goto_session, close_session
allow_remote_control socket-only
listen_on unix:/tmp/kitty-{kitty_pid}

# ── Hyperlinks ───────────────────────────────────────────────
allow_hyperlinks yes

# ── Clipboard (match alacritty osc52 behavior) ──────────────
clipboard_control write-clipboard read-clipboard

# ── Keybindings ──────────────────────────────────────────────

# Prefix: C-z (matches old tmux habit; emacs eats C-z before kitty
# sees it, so no conflict when emacs is running)

# Sessions
map ctrl+z>s save_as_session --use-foreground-process --base-dir ~/.config/kitty/sessions
map ctrl+z>/ goto_session ~/.config/kitty/sessions
map ctrl+z>- goto_session -1
map ctrl+z>c close_session

# Windows (splits)
map ctrl+shift+enter new_window_with_cwd
map ctrl+shift+h neighboring_window left
map ctrl+shift+l neighboring_window right
map ctrl+shift+k neighboring_window up
map ctrl+shift+j neighboring_window down

# Tabs
map ctrl+shift+t new_tab_with_cwd

# Zoom (toggle stack layout)
map ctrl+shift+z toggle_layout stack

# Prompt navigation (shell integration)
map ctrl+shift+up   scroll_to_prompt -1
map ctrl+shift+down scroll_to_prompt 1

# Config reload
map ctrl+shift+f5 load_config_file
